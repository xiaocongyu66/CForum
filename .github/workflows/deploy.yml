name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Pages + Workers
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Ensure D1 database exists in current account
        run: |
          set -euo pipefail

          DB_ID=$(npx wrangler d1 list --json | node -e '
            let input = "";
            process.stdin.on("data", c => input += c);
            process.stdin.on("end", () => {
              const list = JSON.parse(input);
              const db = Array.isArray(list) ? list.find(item => item.name === "cforum-db") : null;
              process.stdout.write(db?.uuid ?? "");
            });
          ')

          if [ -z "$DB_ID" ]; then
            echo "🆕 D1 database cforum-db not found in this account, creating..."
            npx wrangler d1 create cforum-db
            DB_ID=$(npx wrangler d1 list --json | node -e '
              let input = "";
              process.stdin.on("data", c => input += c);
              process.stdin.on("end", () => {
                const list = JSON.parse(input);
                const db = Array.isArray(list) ? list.find(item => item.name === "cforum-db") : null;
                process.stdout.write(db?.uuid ?? "");
              });
            ')
          fi

          if [ -z "$DB_ID" ]; then
            echo "❌ Failed to resolve D1 database id for cforum-db"
            exit 1
          fi

          sed -i -E "s/\"database_id\": \"[^\"]+\"/\"database_id\": \"$DB_ID\"/" wrangler.jsonc
          echo "✅ Using D1 database id: $DB_ID"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Apply D1 database migration (reset + full schema)
        run: |
          set -euo pipefail
          echo "🗄️ Applying D1 migration: 0001_initial_schema.sql"
          npx wrangler d1 execute cforum-db --remote --file=migrations/0001_initial_schema.sql
          echo "✅ Migration applied successfully"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers and Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env=""
          secrets: |
            JWT_SECRET
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload Turnstile secrets (optional)
        run: |
          if [ -n "$TURNSTILE_SITE_KEY" ]; then
            echo "🔐 Uploading Turnstile configuration..."
            npx wrangler secret put TURNSTILE_SITE_KEY --env="" <<< "$TURNSTILE_SITE_KEY"
            npx wrangler secret put TURNSTILE_SECRET_KEY --env="" <<< "$TURNSTILE_SECRET_KEY"
          else
            echo "⏭️  Skipping Turnstile configuration (not configured)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

      - name: Upload BASE_URL (optional)
        run: |
          if [ -n "$BASE_URL" ]; then
            echo "🌐 Uploading BASE_URL configuration..."
            npx wrangler secret put BASE_URL --env="" <<< "$BASE_URL"
          else
            echo "⏭️  Skipping BASE_URL configuration (will use request origin)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload SMTP secrets (optional)
        run: |
          if [ -n "$SMTP_HOST" ]; then
            echo "📧 Uploading SMTP configuration..."
            npx wrangler secret put SMTP_HOST --env="" <<< "$SMTP_HOST"
            npx wrangler secret put SMTP_PORT --env="" <<< "$SMTP_PORT"
            npx wrangler secret put SMTP_USER --env="" <<< "$SMTP_USER"
            npx wrangler secret put SMTP_PASS --env="" <<< "$SMTP_PASS"
            npx wrangler secret put SMTP_FROM --env="" <<< "$SMTP_FROM"
            if [ -n "$SMTP_FROM_NAME" ]; then
              npx wrangler secret put SMTP_FROM_NAME --env="" <<< "$SMTP_FROM_NAME"
            fi
          else
            echo "⏭️  Skipping SMTP configuration (not configured)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}

      - name: Upload S3 secrets (optional)
        run: |
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            echo "☁️ Uploading S3 configuration..."
            npx wrangler secret put AWS_ACCESS_KEY_ID --env="" <<< "$AWS_ACCESS_KEY_ID"
            npx wrangler secret put AWS_SECRET_ACCESS_KEY --env="" <<< "$AWS_SECRET_ACCESS_KEY"
            npx wrangler secret put AWS_REGION --env="" <<< "$AWS_REGION"
            npx wrangler secret put AWS_ENDPOINT --env="" <<< "$AWS_ENDPOINT"
            npx wrangler secret put AWS_BUCKET --env="" <<< "$AWS_BUCKET"
            if [ -n "$AWS_PATH_PREFIX" ]; then
              npx wrangler secret put AWS_PATH_PREFIX --env="" <<< "$AWS_PATH_PREFIX"
            fi
            echo "✅ S3 configuration uploaded"
          else
            echo "⏭️  Skipping S3 configuration (not configured)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ENDPOINT: ${{ secrets.AWS_ENDPOINT }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          AWS_PATH_PREFIX: ${{ secrets.AWS_PATH_PREFIX }}

      - name: Ensure Cloudflare Pages project exists
        run: |
          if npx wrangler pages project list | grep -q "cforum"; then
            echo "✅ Pages project 'cforum' already exists"
          else
            echo "🆕 Creating Pages project 'cforum'"
            npx wrangler pages project create cforum --production-branch main
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy public --project-name=cforum

      - name: Success
        run: |
          echo "✅ 部署完成！"
          echo "📍 Pages: https://cforum.pages.dev (静态资源 - 免费无限)"
          echo "📍 Worker: https://cforum.workers.dev (API - 按需计费)"
          echo "💡 使用 GitHub Secrets 配置自定义域名"
